<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Game Tangkap Buah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Game Tangkap Buah</h1>
  <p>Gerakkan keranjang pakai tombol panah kiri dan kanan.</p>

  <div class="info">
    <span>Score: <b id="score">0</b></span>
    <span>Nyawa: <b id="life">3</b></span>
  </div>

  <div id="gameArea">
    <div id="fruit">🍎</div>
    <div id="basket">🧺</div>
  </div>

  <div class="controls">
    <button id="startBtn">▶ START</button>
    <button id="pauseBtn">⏸ PAUSE</button>
    <button id="restartBtn">🔄 RESTART</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
